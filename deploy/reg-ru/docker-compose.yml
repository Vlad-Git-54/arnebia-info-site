services:
  arnebia:
    build:
      context: ../..
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      NODE_ENV: production
      NEXT_PUBLIC_SITE_URL: https://arnebia-info.ru
      HOST: 0.0.0.0
      PORT: 3000
      VINEXT_TRUST_PROXY: "1"
      ADMIN_DATA_DIR: /app/data
      ADMIN_PASSWORD: ${ADMIN_PASSWORD:-}
      ADMIN_SESSION_SECRET: ${ADMIN_SESSION_SECRET:-}
    expose:
      - "3000"
    volumes:
      - arnebia_data:/app/data

  caddy:
    image: caddy:2.8-alpine
    restart: unless-stopped
    depends_on:
      - arnebia
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config

volumes:
  arnebia_data:
  caddy_data:
  caddy_config:
